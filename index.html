<!doctype html>
<html lang="en">
<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />

  <!-- SEO -->
  <title>silentPDF AI | Private PDF Tools That Actually Work</title>

  <meta
    name="description"
    content="Merge, split, compress, rotate, convert, and protect PDFs directly in your browser with silentPDF AI."
  />

  <meta
    name="keywords"
    content="PDF tools, merge PDF, compress PDF, split PDF, rotate PDF, convert PDF, private PDF tools, silentPDF AI"
  />

  <meta name="author" content="silentPDF AI" />

  <!-- Canonical is set per-route via react-helmet-async (see src/components/Seo.tsx) -->


  <!-- Favicons -->
  <link
    rel="icon"
    type="image/x-icon"
    href="/silentpdf-favicon.ico"
  />

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="/apple-touch-icon.png"
  />

  <link
    rel="manifest"
    href="/site.webmanifest"
  />

  <!-- Open Graph -->
  <meta
    property="og:title"
    content="silentPDF AI | Private PDF Tools That Actually Work"
  />

  <meta
    property="og:description"
    content="Fast, secure, privacy-first PDF tools that run directly in your browser."
  />

  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:site_name"
    content="silentPDF AI"
  />

  <meta
    property="og:url"
    content="https://silentpdfai.pages.dev/"
  />

  <meta
    property="og:image"
    content="https://silentpdfai.pages.dev/og-image.png"
  />

  <!-- Twitter -->
  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="silentPDF AI"
  />

  <meta
    name="twitter:description"
    content="Fast, private PDF tools that actually work."
  />

  <meta
    name="twitter:image"
    content="https://silentpdfai.pages.dev/og-image.png"
  />

  <!-- Per-route JSON-LD (Organization, WebSite, SoftwareApplication, HowTo, FAQPage, BreadcrumbList) is injected by src/components/Seo.tsx via react-helmet-async -->

  <!-- Google Analytics -->
  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-FRMJ9C08B5"
  ></script>

  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-FRMJ9C08B5');
  </script>
  <!--app-head-->
</head>

<body>
  <div id="root"><!--app-html--></div>

  <script
    type="module"
    src="/src/main.tsx"
  ></script>
</body>
</html>
